<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="infos">
          <div class="info">
            <h3>
              High Score:
              <span id="high-score">0</span>
            </h3>
          </div>

          <div class="info">
            <h3>
              Score:
              <span id="score">0</span>
            </h3>
          </div>

          <div class="info">
            <h3>
              Time:
              <span id="time">0</span>
            </h3>
          </div>
        </div>
        <div class="board">
            
        </div>
      </section>
      <div class="modal">
        <div class="start-game">
            <h3>Press (Click) Enter or Space to start game</h3>
            <button class="btn-start">Start Game</button>
        </div>
        <div class="game-over">
            <h3>Game Over</h3>
            <button class="btn-restart">Restart Game</button>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
